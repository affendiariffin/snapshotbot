<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>40K Battlefield Snapshot Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --red: #cc2233;
    --red-dim: rgba(204,34,51,0.18);
    --blue: #2255cc;
    --blue-dim: rgba(34,85,204,0.18);
    --bg: #0d0f12;
    --panel: #13161b;
    --border: #2a2f3a;
    --mat: #1a2820;
    --mat-line: rgba(100,140,120,0.13);
    --text: #c8d4c0;
    --accent: #4fc88a;
    --warn: #f0a030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  header .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #556;
    margin-top: 1px;
  }

  .upload-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 7px 18px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background .15s, color .15s;
  }
  .upload-btn:hover { background: var(--accent); color: #000; }

  #fileInput { display: none; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    display: none;
  }

  .sidebar-section {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h3 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #556;
    margin-bottom: 8px;
  }

  .score-block {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 8px;
  }

  .score-team {
    flex: 1;
    text-align: center;
  }

  .score-team .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .score-team.red .label { color: var(--red); }
  .score-team.blue .label { color: #5588ff; }

  .score-team .pts {
    font-family: 'Share Tech Mono', monospace;
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
  }
  .score-team.red .pts { color: #ff4455; }
  .score-team.blue .pts { color: #5599ff; }

  .score-sep { color: #334; font-size: 22px; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
  }
  .meta-row .key { color: #556; }
  .meta-row .val { color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 11px; }

  .unit-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  .unit-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px;
    cursor: pointer;
    transition: background .1s;
    font-size: 13px;
  }
  .unit-item:hover { background: rgba(255,255,255,0.04); }
  .unit-item.highlighted { background: rgba(79,200,138,0.1); }

  .unit-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .unit-dot.red { background: var(--red); }
  .unit-dot.blue { background: var(--blue); }
  .unit-dot.neutral { background: #668; }

  .unit-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Map area ── */
  .map-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  .drop-zone {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--border);
    color: #334;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    user-select: none;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    color: var(--accent);
  }
  .drop-zone svg { margin-bottom: 12px; opacity: 0.3; }
  .drop-zone:hover svg, .drop-zone.drag-over svg { opacity: 0.8; }

  #mapCanvas {
    display: none;
    max-width: 100%;
    max-height: 100%;
    image-rendering: crisp-edges;
  }

  /* ── Timeline bar ── */
  .timeline-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 16px 12px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .timeline-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-play {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #000;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s, transform .1s;
  }
  .btn-play:hover { background: #7fffb8; transform: scale(1.08); }
  .btn-play:disabled { background: #2a3a30; color: #445; cursor: default; transform: none; }

  .btn-step {
    background: transparent;
    border: 1px solid var(--border);
    color: #889;
    width: 28px;
    height: 28px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  .btn-step:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-step:disabled { opacity: 0.25; cursor: default; }

  .speed-select {
    background: transparent;
    border: 1px solid var(--border);
    color: #889;
    padding: 3px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }
  .speed-select:focus { outline: none; border-color: var(--accent); }

  .snap-info-row {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #556;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .snap-info-row .snap-time { color: var(--accent); }

  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #556;
    margin-left: auto;
  }
  .legend-item { display: flex; gap: 5px; align-items: center; }
  .legend-box { width: 11px; height: 11px; border: 1px solid rgba(255,255,255,0.15); }

  /* Slider track */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-wrap {
    flex: 1;
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
  }

  /* Tick marks behind slider */
  .slider-ticks {
    position: absolute;
    left: 0; right: 0; top: 0; bottom: 0;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    padding-bottom: 2px;
  }
  .tick {
    position: absolute;
    bottom: 2px;
    width: 1px;
    background: #2a3a30;
    height: 8px;
    transform: translateX(-50%);
  }
  .tick.major {
    background: #3a5040;
    height: 12px;
  }
  .tick-label {
    position: absolute;
    bottom: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: #445;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  input[type=range]#snapSlider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill, 0%), #1e2a22 var(--fill, 0%));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    position: relative;
    z-index: 1;
  }
  input[type=range]#snapSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid #0d0f12;
    box-shadow: 0 0 0 1px var(--accent);
    cursor: pointer;
    transition: transform .1s;
  }
  input[type=range]#snapSlider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]#snapSlider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 3px solid #0d0f12;
    cursor: pointer;
  }
  input[type=range]#snapSlider:disabled { opacity: 0.3; cursor: default; }

  .slider-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #556;
    min-width: 44px;
    text-align: right;
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(10,12,16,0.95);
    border: 1px solid var(--accent);
    padding: 8px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text);
    display: none;
    z-index: 100;
    max-width: 240px;
    line-height: 1.7;
  }
  #tooltip .tip-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚔ Battlefield Snapshot</h1>
    <div class="subtitle">GameStateSnapshot v1.0 · Hutber 40k Competitive 10e</div>
  </div>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 Load JSON</button>
  <input type="file" id="fileInput" accept=".json" multiple>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section" id="scoreSection">
      <h3>Score</h3>
      <div class="score-block">
        <div class="score-team red">
          <div class="pts" id="redScore">–</div>
          <div class="label">Red</div>
        </div>
        <div class="score-sep">:</div>
        <div class="score-team blue">
          <div class="pts" id="blueScore">–</div>
          <div class="label">Blue</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section" id="metaSection">
      <h3>Game Info</h3>
      <div id="metaRows"></div>
    </div>

    <div class="sidebar-section" style="padding-bottom:6px;">
      <h3>Units <span id="unitCount" style="color:#445;font-size:10px;"></span></h3>
    </div>
    <div class="unit-list" id="unitList">
      <div style="padding:20px 14px;color:#334;font-size:12px;text-align:center;">Load a snapshot to see units</div>
    </div>
  </div>

  <!-- Map -->
  <div class="map-container" id="mapContainer">
    <div class="drop-zone" id="dropZone">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="4" width="56" height="56" stroke="currentColor" stroke-width="2" rx="2"/>
        <circle cx="32" cy="24" r="6" stroke="currentColor" stroke-width="2"/>
        <circle cx="20" cy="40" r="5" stroke="currentColor" stroke-width="2"/>
        <circle cx="44" cy="38" r="5" stroke="currentColor" stroke-width="2"/>
        <line x1="20" y1="40" x2="32" y2="24" stroke="currentColor" stroke-width="1.5"/>
        <line x1="32" y1="24" x2="44" y2="38" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      Drop snapshot JSON here<br>
      <span style="font-size:12px;margin-top:6px;display:block;">or click Load JSON above</span>
    </div>
    <canvas id="mapCanvas"></canvas>
  </div>
</div>

<div class="timeline-bar">
  <!-- Top row: controls + info -->
  <div class="timeline-controls">
    <button class="btn-step" id="btnPrev" disabled title="Previous snapshot">◀</button>
    <button class="btn-play" id="btnPlay" disabled title="Play/Pause">▶</button>
    <button class="btn-step" id="btnNext" disabled title="Next snapshot">▶</button>

    <select class="speed-select" id="speedSelect" title="Playback speed">
      <option value="2000">0.5×</option>
      <option value="1000" selected>1×</option>
      <option value="500">2×</option>
      <option value="250">4×</option>
      <option value="100">10×</option>
    </select>

    <div class="snap-info-row" id="snapInfo">
      Load snapshot JSON files to begin playback
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-box" style="background:#cc2233;border-radius:0 50% 0 50%;transform:rotate(45deg)"></div>Red</div>
      <div class="legend-item"><div class="legend-box" style="background:#2255cc;border-radius:50%;border:none;"></div>Blue</div>
      <div class="legend-item"><div class="legend-box" style="background:#3c3223;border:1px solid rgba(140,110,60,0.7);"></div>Terrain</div>
      <div class="legend-item"><div class="legend-box" style="background:#282000;border:1px solid #f0c020;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);"></div>Objective</div>
    </div>
  </div>

  <!-- Slider row -->
  <div class="slider-row">
    <span class="slider-label" id="sliderLeft">0:00</span>
    <div class="slider-wrap">
      <div class="slider-ticks" id="sliderTicks"></div>
      <input type="range" id="snapSlider" min="0" max="0" value="0" disabled>
    </div>
    <span class="slider-label" id="sliderRight" style="text-align:left;">0/0</span>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ── State ──────────────────────────────────────────────────────────
let snapshots = [];
let currentIdx = 0;
let highlightedUnit = null;
let playTimer = null;
let globalBounds  = null;  // locked bounds across all snapshots for stable view
let globalMatRect = null;  // exact 60×44" board rect in TTS-inch units
const BACKGROUND_TAGS = new Set(['Board', 'Tile']); // non-renderable background objects

// Canvas
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');

// ── File loading ───────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  loadFiles([...e.target.files]);
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadFiles([...e.dataTransfer.files]);
});
dropZone.addEventListener('click', () => document.getElementById('fileInput').click());

async function loadFiles(files) {
  const jsons = files.filter(f => f.name.endsWith('.json'));
  const loaded = await Promise.all(jsons.map(f => f.text().then(t => {
    try { return JSON.parse(t); } catch { return null; }
  })));
  const valid = loaded.filter(Boolean);
  if (!valid.length) return;

  valid.sort((a, b) => (a.meta?.snapshot_index || 0) - (b.meta?.snapshot_index || 0));
  snapshots = [...snapshots, ...valid];
  snapshots.sort((a, b) => (a.meta?.snapshot_index || 0) - (b.meta?.snapshot_index || 0));
  currentIdx = snapshots.length - valid.length;

  // Compute stable global bounds, preferring Board object's actual extent
  globalBounds = computeGlobalBounds(snapshots);

  setupSlider();
  renderAll();
}

// ── Slider setup ───────────────────────────────────────────────────
function setupSlider() {
  const slider = document.getElementById('snapSlider');
  slider.min = 0;
  slider.max = Math.max(0, snapshots.length - 1);
  slider.value = currentIdx;
  slider.disabled = snapshots.length < 2;

  // Enable buttons
  document.getElementById('btnPlay').disabled = snapshots.length < 2;

  // Build tick marks
  buildTicks();
  updateSliderFill();
}

function buildTicks() {
  const container = document.getElementById('sliderTicks');
  container.innerHTML = '';
  if (snapshots.length < 2) return;

  snapshots.forEach((snap, i) => {
    const pct = i / (snapshots.length - 1) * 100;
    const tick = document.createElement('div');
    tick.className = 'tick' + (snap.meta?.reason === 'game_start' || i === 0 ? ' major' : '');
    tick.style.left = pct + '%';
    container.appendChild(tick);

    // Label every ~5th tick or on special events
    const isSpecial = snap.meta?.reason === 'game_start';
    const showLabel = isSpecial || snapshots.length <= 12 || i % Math.ceil(snapshots.length / 10) === 0;
    if (showLabel) {
      const label = document.createElement('div');
      label.className = 'tick-label';
      label.style.left = pct + '%';
      const ts = snap.meta?.timestamp ?? '';
      // Extract HH:MM from timestamp like 2026-02-25_14-30-00
      const match = ts.match(/_(\d{2})-(\d{2})-\d{2}$/);
      label.textContent = match ? `${match[1]}:${match[2]}` : `#${i+1}`;
      container.appendChild(label);
    }
  });
}

function updateSliderFill() {
  const slider = document.getElementById('snapSlider');
  const pct = snapshots.length < 2 ? 0 : (currentIdx / (snapshots.length - 1) * 100);
  slider.style.setProperty('--fill', pct + '%');
  document.getElementById('sliderLeft').textContent = formatTime(currentIdx);
  document.getElementById('sliderRight').textContent = `${currentIdx+1}/${snapshots.length}`;
}

function parseTimestamp(ts) {
  if (!ts) return null;
  const m = ts.match(/^(\d{4})-(\d{2})-(\d{2})_(\d{2})-(\d{2})-(\d{2})$/);
  if (!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]).getTime();
}

function formatTime(idx) {
  const firstTs = parseTimestamp(snapshots[0]?.meta?.timestamp);
  const currTs  = parseTimestamp(snapshots[idx]?.meta?.timestamp);
  if (firstTs != null && currTs != null) {
    const elapsed = Math.round((currTs - firstTs) / 60000);
    const h = Math.floor(elapsed / 60), m = elapsed % 60;
    return h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m}:00`;
  }
  return `#${idx + 1}`;
}

// ── Slider interaction ─────────────────────────────────────────────
document.getElementById('snapSlider').addEventListener('input', e => {
  stopPlay();
  currentIdx = parseInt(e.target.value);
  renderAll();
});

// ── Step buttons ───────────────────────────────────────────────────
document.getElementById('btnPrev').addEventListener('click', () => {
  stopPlay();
  if (currentIdx > 0) { currentIdx--; syncSlider(); renderAll(); }
});
document.getElementById('btnNext').addEventListener('click', () => {
  stopPlay();
  if (currentIdx < snapshots.length - 1) { currentIdx++; syncSlider(); renderAll(); }
});

function syncSlider() {
  document.getElementById('snapSlider').value = currentIdx;
  updateSliderFill();
}

// ── Playback ───────────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', togglePlay);

function togglePlay() {
  if (playTimer) { stopPlay(); return; }

  // If at end, restart
  if (currentIdx >= snapshots.length - 1) currentIdx = 0;

  const btn = document.getElementById('btnPlay');
  btn.textContent = '⏸';
  btn.style.background = '#f0a030';

  function tick() {
    if (currentIdx >= snapshots.length - 1) { stopPlay(); return; }
    currentIdx++;
    syncSlider();
    renderAll();
    const speed = parseInt(document.getElementById('speedSelect').value);
    playTimer = setTimeout(tick, speed);
  }
  const speed = parseInt(document.getElementById('speedSelect').value);
  playTimer = setTimeout(tick, speed);
}

function stopPlay() {
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  const btn = document.getElementById('btnPlay');
  btn.textContent = '▶';
  btn.style.background = 'var(--accent)';
}

// ── Keyboard shortcuts ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!snapshots.length) return;
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') { stopPlay(); if (currentIdx < snapshots.length-1) { currentIdx++; syncSlider(); renderAll(); } }
  if (e.key === 'ArrowLeft')  { stopPlay(); if (currentIdx > 0) { currentIdx--; syncSlider(); renderAll(); } }
});

// ── Render ─────────────────────────────────────────────────────────
function renderAll() {
  if (!snapshots.length) return;
  const snap = snapshots[currentIdx];

  // Step button states
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').disabled = currentIdx === snapshots.length - 1;

  updateSliderFill();

  // Scores
  document.getElementById('redScore').textContent = snap.scores?.red?.total ?? '–';
  document.getElementById('blueScore').textContent = snap.scores?.blue?.total ?? '–';

  // Meta
  const meta = [
    ['Round', snap.game?.round ?? snap.game?.current_turn ?? '?'],
    ['Turn', snap.game?.current_turn ?? '?'],
    ['First', snap.game?.first_player ?? '?'],
    ['Mission', snap.mission?.primary ?? '?'],
    ['Deploy', snap.mission?.deployment ?? '?'],
    ['Map', snap.mission?.map_name ?? '?'],
    ['Snapshot', snap.meta?.snapshot_index ?? '?'],
    ['Time', (snap.meta?.timestamp ?? '').replace(/_/g,' ')],
    ['Reason', snap.meta?.reason ?? '?'],
  ];
  document.getElementById('metaRows').innerHTML = meta.map(([k,v]) =>
    `<div class="meta-row"><span class="key">${k}</span><span class="val">${v}</span></div>`
  ).join('');

  // Snap info bar
  const ts = (snap.meta?.timestamp ?? '').replace(/_/g,' ');
  const elapsed = formatTime(currentIdx);
  document.getElementById('snapInfo').innerHTML =
    `<span class="snap-time">${elapsed}</span> &nbsp;·&nbsp; ${ts} &nbsp;·&nbsp; ${snap.meta?.reason ?? ''} &nbsp;·&nbsp; ${snap.battlefield_objects?.length ?? 0} objects`;

  // Draw map
  drawMap(snap);

  // Unit list
  buildUnitList(snap);
}

// ── Determine team from rotation.y ─────────────────────────────────
// In TTS Hutber mod, red typically faces one direction, blue the other.
// We'll use a heuristic: objects with y rotation near 0 or near 360 = blue,
// near 180 = red. But we don't have reliable team data, so we use
// name-based heuristics and position (left=blue, right=red relative to midpoint).
function guessTeam(obj, bounds) {
  const mid = globalMatRect
    ? (globalMatRect.minX + globalMatRect.maxX) / 2
    : (bounds.minX + bounds.maxX) / 2;
  if (!bounds || bounds.minX === bounds.maxX) return 'neutral';
  return obj.position.x < mid ? 'blue' : 'red';
}

// ── Compute bounds ─────────────────────────────────────────────────
function getBounds(objects) {
  if (!objects || !objects.length) return { minX:-20, maxX:20, minZ:-15, maxZ:15 };
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const o of objects) {
    if (o.position.x < minX) minX = o.position.x;
    if (o.position.x > maxX) maxX = o.position.x;
    if (o.position.z < minZ) minZ = o.position.z;
    if (o.position.z > maxZ) maxZ = o.position.z;
  }
  // Add padding
  const px = (maxX - minX) * 0.08 + 3;
  const pz = (maxZ - minZ) * 0.08 + 3;
  return { minX: minX - px, maxX: maxX + px, minZ: minZ - pz, maxZ: maxZ + pz };
}

function stripBBCode(s) {
  return (s || '').replace(/\[[^\]]*\]/g, '').trim();
}

// "[00ff16]4/4[-] Wraith w/ claws and particle caster" → "Wraith"
// "[00ff16]16/16[-] C'tan Shard of the Void Dragon"   → "C'tan Shard of the Void Dragon"
function extractUnitName(raw) {
  let s = stripBBCode(raw);
  s = s.replace(/^\d+\/\d+\s+/, ''); // strip "4/4 " HP prefix
  s = s.replace(/\s+w\/.*$/i, '');    // strip " w/ loadout" suffix
  return s.trim();
}

function computeGlobalBounds(snaps) {
  for (const snap of snaps) {
    const board = (snap.battlefield_objects || []).find(o => o.tag === 'Board');
    if (board && board.size) {
      const hw = board.size.x / 2, hh = board.size.z / 2;
      const pad = 2;
      globalMatRect = {
        minX: board.position.x - hw, maxX: board.position.x + hw,
        minZ: board.position.z - hh, maxZ: board.position.z + hh,
      };
      return {
        minX: board.position.x - hw - pad, maxX: board.position.x + hw + pad,
        minZ: board.position.z - hh - pad, maxZ: board.position.z + hh + pad,
      };
    }
  }
  globalMatRect = null;
  const allObjs = snaps.flatMap(s => (s.battlefield_objects || []).filter(o => !BACKGROUND_TAGS.has(o.tag)));
  return getBounds(allObjs);
}

// ── Draw ──────────────────────────────────────────────────────────
function drawMap(snap) {
  dropZone.style.display = 'none';
  canvas.style.display = 'block';

  const container = document.getElementById('mapContainer');
  const W = container.clientWidth - 40;
  const H = container.clientHeight - 40;
  canvas.width = W;
  canvas.height = H;

  const rawObjs = (snap.battlefield_objects || []).filter(o => !BACKGROUND_TAGS.has(o.tag));

  // Deduplicate overlapping terrain shells — Hutber uses inner+outer mesh pairs
  // at identical positions. For terrain, deduplicate by position alone.
  // For units, keep all (two models can legitimately overlap briefly).
  const objs = rawObjs.filter((o, i) => {
    if (o.type !== 'terrain' && !(!o.type && isTerrainObj(o))) return true;
    return !rawObjs.slice(0, i).some(prev =>
      (prev.type === 'terrain' || (!prev.type && isTerrainObj(prev))) &&
      Math.abs(prev.position.x - o.position.x) < 0.5 &&
      Math.abs(prev.position.z - o.position.z) < 0.5
    );
  });
  // Use stable global bounds so map doesn't jump between snapshots
  const bounds = globalBounds || getBounds(objs);

  const worldW = bounds.maxX - bounds.minX;
  const worldH = bounds.maxZ - bounds.minZ;
  const scale = Math.min(W / worldW, H / worldH);

  function wx(x) { return (x - bounds.minX) * scale; }
  function wz(z) { return (bounds.maxZ - z) * scale; } // flip Z: TTS Z+ = up, canvas Y+ = down

  const CW = worldW * scale;
  const CH = worldH * scale;
  const offX = (W - CW) / 2;
  const offY = (H - CH) / 2;

  function px(x) { return offX + wx(x); }
  function pz(z) { return offY + wz(z); }

  // Background - battlefield green
  ctx.fillStyle = '#151f18';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(80,120,90,0.12)';
  ctx.lineWidth = 1;
  const gridStep = Math.round(worldW / 10);
  for (let gx = Math.ceil(bounds.minX / gridStep) * gridStep; gx <= bounds.maxX; gx += gridStep) {
    ctx.beginPath(); ctx.moveTo(px(gx), offY); ctx.lineTo(px(gx), offY + CH); ctx.stroke();
  }
  for (let gz = Math.ceil(bounds.minZ / gridStep) * gridStep; gz <= bounds.maxZ; gz += gridStep) {
    ctx.beginPath(); ctx.moveTo(offX, pz(gz)); ctx.lineTo(offX + CW, pz(gz)); ctx.stroke();
  }

  // Midline
  const midX = (bounds.minX + bounds.maxX) / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.setLineDash([6, 6]);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(px(midX), offY); ctx.lineTo(px(midX), offY + CH); ctx.stroke();
  ctx.setLineDash([]);

  // Deployment zones (rough halves)
  ctx.fillStyle = 'rgba(204,34,51,0.045)';
  ctx.fillRect(px(midX), offY, px(bounds.maxX) - px(midX), CH);
  ctx.fillStyle = 'rgba(34,85,204,0.045)';
  ctx.fillRect(offX, offY, px(midX) - offX, CH);

  // Mat border — exact 60×44" when Board data is available
  const mat = globalMatRect;
  const matX1 = mat ? px(mat.minX) : offX;
  const matZ1 = mat ? Math.min(pz(mat.minZ), pz(mat.maxZ)) : offY;
  const matX2 = mat ? px(mat.maxX) : offX + CW;
  const matZ2 = mat ? Math.max(pz(mat.minZ), pz(mat.maxZ)) : offY + CH;
  const matW  = matX2 - matX1;
  const matH  = matZ2 - matZ1;

  // Real 40K deployment zones: 9" strips along each long edge
  const deployDepth = 9 * scale;
  ctx.fillStyle = 'rgba(204,34,51,0.055)';
  ctx.fillRect(matX2 - deployDepth, matZ1, deployDepth, matH);
  ctx.fillStyle = 'rgba(34,85,204,0.055)';
  ctx.fillRect(matX1, matZ1, deployDepth, matH);

  ctx.strokeStyle = 'rgba(100,160,110,0.55)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(matX1, matZ1, matW, matH);

  // Unit radius relative to map scale
  const unitR = Math.max(8, Math.min(22, scale * 1.2));
  const fontSize = Math.max(7, Math.min(11, unitR * 0.85));

  // Separate layers — use explicit type field (v1.1+) with fallback for v1.0 snapshots
  const terrain    = objs.filter(o => o.type === 'terrain'   || (!o.type && isTerrainObj(o)));
  const objectives = objs.filter(o => o.type === 'objective' || (!o.type && isObjectiveObj(o)));
  const units      = objs.filter(o => o.type === 'unit'      || (!o.type && !isTerrainObj(o) && !isObjectiveObj(o)));

  // Layer 1: terrain
  terrain.forEach(obj => {
    drawTerrain(px(obj.position.x), pz(obj.position.z), obj,
                unitR, fontSize, scale);
  });

  // Layer 2: objectives — 192mm real diameter = 7.56" = 3.78" radius in TTS units
  const objRadius = 3.78 * scale;
  objectives.forEach((obj, i) => {
    drawObjective(px(obj.position.x), pz(obj.position.z), obj.name, i + 1, objRadius, fontSize);
  });

  // Layer 3: units
  units.forEach(obj => {
    const x = px(obj.position.x);
    const z = pz(obj.position.z);
    const team = guessTeam(obj, { minX: bounds.minX, maxX: bounds.maxX });
    const name = obj.name || obj.description || obj.guid?.slice(0,6) || '?';
    drawUnit(x, z, name, team, unitR, fontSize, obj.tag, highlightedUnit === obj.guid);
  });

  // Store all objects for hit testing
  canvas._mapData = { objs, units, terrain, objectives, px, pz, unitR, bounds };
}

function isTerrainObj(obj) {
  if (obj.description === 'terrain') return true;
  if (!obj.locked) return false;
  const terrainNames = ['ruin','ruins','wall','barricade','rubble','crater','terrain','intact','bunker','fence','hedge','forest','woods','building','structure','tower'];
  const n = (obj.name || '').toLowerCase();
  return terrainNames.some(t => n.includes(t));
}

function isObjectiveObj(obj) {
  if (obj.description === 'objective') return true;
  const n = (obj.name || '').toLowerCase();
  return n.includes('objective') || n.includes('primary objective');
}

// The three Hutber terrain building blocks (width × depth in inches)
// Complex shapes (L, V, chevron) are two blocks placed adjacently.
const STANDARD_SIZES = [
  { x: 12, z: 6  },
  { x: 6,  z: 12 },
  { x: 10, z: 5  },
  { x: 5,  z: 10 },
  { x: 6,  z: 4  },
  { x: 4,  z: 6  },
];

function snapToStandard(wx, wz) {
  let best = null, bestDist = Infinity;
  for (const s of STANDARD_SIZES) {
    const d = Math.abs(wx - s.x) + Math.abs(wz - s.z);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  // Only snap if reasonably close (within 2"); otherwise use raw value
  return bestDist < 2 ? best : { x: wx, z: wz };
}

function getTerrainFootprint(obj, scale) {
  const name = obj.name || '';
  const size = obj.size;
  const clean = name.replace(/\[sup\].*?\[\/sup\]/gi, '').replace(/\[[^\]]*\]/g, '').trim();

  // Use footprint_rotation if provided (new v1.2 data from BlockSquare plate lookup)
  const rotY = (obj.footprint_rotation != null) ? obj.footprint_rotation : (obj.rotation_y || 0);

  let rawX, rawZ;
  if (size && size.x >= 1 && size.z >= 1) {
    rawX = size.x; rawZ = size.z;
  } else {
    // Sub-inch fallback — infer from name
    const isBarricade = clean.toLowerCase().includes('barricade');
    if      (clean.startsWith('Ruin (12")'))               { rawX = 12; rawZ = 6; }
    else if (clean.startsWith('Ruin (9")') && isBarricade) { rawX = 10; rawZ = 5; }
    else if (clean.startsWith('Ruin (9")'))                { rawX = 12; rawZ = 6; }
    else if (clean.startsWith('Ruin (6")'))                { rawX = 10; rawZ = 5; }
    else if (clean.startsWith('Ruin (2")'))                { rawX = 6;  rawZ = 4; }
    else return null;
  }

  // Diagonal pieces: use canvas rotation
  const rot = ((rotY % 360) + 360) % 360;
  const isDiagonal = Math.min(rot % 90, 90 - rot % 90) > 20;
  if (isDiagonal) {
    return { x: rawX, z: rawZ, diagonal: true, rotY };
  }

  // Axis-aligned: swap axes when ~90° or ~270°
  const swapped = (rot > 45 && rot < 135) || (rot > 225 && rot < 315);
  return snapToStandard(swapped ? rawZ : rawX, swapped ? rawX : rawZ);
}

function drawTerrain(x, z, obj, r, fontSize, scale) {
  const fp = getTerrainFootprint(obj, scale);
  if (!fp) return;
  const name = obj.name || '';
  const clean = name.replace(/\[sup\].*?\[\/sup\]/gi, '').replace(/\[[^\]]*\]/g, '').trim();
  const label = clean.slice(0, 10);
  const sp = Math.max(6, r * 0.55);

  ctx.save();

  if (fp.diagonal) {
    const snapped = snapToStandard(fp.x, fp.z);
    const w = snapped.x * scale;
    const h = snapped.z * scale;
    ctx.translate(x, z);
    ctx.rotate(-fp.rotY * Math.PI / 180); // negate: Z-axis flip reverses rotation direction
    ctx.fillStyle = 'rgba(60,50,35,0.75)';
    ctx.strokeStyle = 'rgba(140,110,60,0.7)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.rect(-w/2, -h/2, w, h); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = 'rgba(140,110,60,0.22)'; ctx.lineWidth = 0.8;
    ctx.save(); ctx.clip();
    for (let i = -w; i < w * 2; i += sp) {
      ctx.beginPath(); ctx.moveTo(i - h, -h); ctx.lineTo(i + h, h); ctx.stroke();
    }
    ctx.restore();
  } else {
    const w = fp.x * scale;
    const h = fp.z * scale;
    ctx.fillStyle = 'rgba(60,50,35,0.75)';
    ctx.strokeStyle = 'rgba(140,110,60,0.7)';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.rect(x - w/2, z - h/2, w, h); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = 'rgba(140,110,60,0.22)'; ctx.lineWidth = 0.8;
    ctx.save(); ctx.clip();
    for (let i = x - w; i < x + w * 2; i += sp) {
      ctx.beginPath(); ctx.moveTo(i - h, z - h); ctx.lineTo(i + h, z + h); ctx.stroke();
    }
    ctx.restore();
    if (label) {
      ctx.font = `${Math.max(6, fontSize - 1)}px "Share Tech Mono", monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillText(label, x+1, z+1);
      ctx.fillStyle = 'rgba(180,150,90,0.9)'; ctx.fillText(label, x, z);
    }
  }

  ctx.restore();
}

function drawTerrain(x, z, name, rotY, r, fontSize, size, scale) {
  const fp = getTerrainFootprint(name, size, rotY);
  if (!fp) return; // skip sub-inch decorative pieces

  ctx.save();
  const w = fp.x * scale;
  const h = fp.z * scale;

  ctx.fillStyle = 'rgba(60,50,35,0.75)';
  ctx.strokeStyle = 'rgba(140,110,60,0.7)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.rect(x - w/2, z - h/2, w, h);
  ctx.fill();
  ctx.stroke();

  // Hatch lines
  ctx.strokeStyle = 'rgba(140,110,60,0.22)';
  ctx.lineWidth = 0.8;
  ctx.save();
  ctx.clip();
  const spacing = Math.max(6, r * 0.55);
  for (let i = x - w; i < x + w * 2; i += spacing) {
    ctx.beginPath(); ctx.moveTo(i - h, z - h); ctx.lineTo(i + h, z + h); ctx.stroke();
  }
  ctx.restore();

  // Label
  const clean = (name || '').replace(/\[sup\].*?\[\/sup\]/gi, '').replace(/\[[^\]]*\]/g, '').trim();
  const label = clean.slice(0, 10);
  if (label) {
    ctx.font = `${Math.max(6, fontSize - 1)}px "Share Tech Mono", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillText(label, x+1, z+1);
    ctx.fillStyle = 'rgba(180,150,90,0.9)';
    ctx.fillText(label, x, z);
  }

  ctx.restore();
}

function drawObjective(x, z, name, num, r, fontSize) {
  ctx.save();
  const or_ = r; // r is already the correct pixel radius

  // Outer glow
  const grad = ctx.createRadialGradient(x, z, or_ * 0.3, x, z, or_ * 1.6);
  grad.addColorStop(0, 'rgba(255,200,0,0.25)');
  grad.addColorStop(1, 'rgba(255,200,0,0)');
  ctx.beginPath();
  ctx.arc(x, z, or_ * 1.6, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Circle (objectives are round, not hexagonal)
  ctx.beginPath();
  ctx.arc(x, z, or_, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(40,30,0,0.7)';
  ctx.fill();
  ctx.strokeStyle = '#f0c020';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Number
  const numFontSize = Math.max(10, or_ * 0.55);
  ctx.font = `bold ${numFontSize}px "Rajdhani", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#f0c020';
  ctx.fillText(num, x, z);

  ctx.restore();
}

function drawUnit(x, z, name, team, r, fontSize, tag, highlighted) {
  const colors = {
    red:  { fill: '#8b0000', stroke: '#cc2233', text: '#ffaaaa', light: '#ff4455' },
    blue: { fill: '#001a66', stroke: '#2255cc', text: '#aabbff', light: '#5588ff' },
    neutral: { fill: '#1a2230', stroke: '#445566', text: '#aabbcc', light: '#6688aa' },
  };
  const c = colors[team];

  ctx.save();

  if (highlighted) {
    // Glow ring
    ctx.beginPath();
    ctx.arc(x, z, r + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#4fc88a';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Shape: circle for infantry/tokens, square for vehicles (Tag based)
  const isVehicle = tag === 'Figurine' || (tag && tag.toLowerCase().includes('model'));
  // Use square diamond for red, circle for blue as per screenshot style
  if (team === 'red') {
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(x,     z - r);
    ctx.lineTo(x + r, z);
    ctx.lineTo(x,     z + r);
    ctx.lineTo(x - r, z);
    ctx.closePath();
  } else {
    ctx.beginPath();
    ctx.arc(x, z, r, 0, Math.PI * 2);
  }

  ctx.fillStyle = c.fill;
  ctx.fill();
  ctx.strokeStyle = highlighted ? '#4fc88a' : c.stroke;
  ctx.lineWidth = highlighted ? 2.5 : 1.5;
  ctx.stroke();

  // Label below
  const cleanName = extractUnitName(name);
  const shortName = cleanName.length > 16 ? cleanName.slice(0, 14) + '…' : cleanName;
  ctx.font = `bold ${fontSize}px "Rajdhani", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  // Text shadow
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillText(shortName, x + 1, z + r + 2 + 1);
  ctx.fillStyle = highlighted ? '#4fc88a' : c.text;
  ctx.fillText(shortName, x, z + r + 2);

  ctx.restore();
}

// ── Tooltip on hover ───────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const d = canvas._mapData;
  if (!d) return;

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const hit = d.objs.find(obj => {
    const ox = d.px(obj.position.x);
    const oz = d.pz(obj.position.z);
    const dx = mx - ox, dy = my - oz;
    return Math.sqrt(dx*dx + dy*dy) <= d.unitR + 4;
  });

  const tip = document.getElementById('tooltip');
  if (hit) {
    const team = guessTeam(hit, { minX: d.bounds.minX, maxX: d.bounds.maxX });
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
    tip.innerHTML = `
      <div class="tip-name">${extractUnitName(hit.name) || '(unnamed)'}</div>
      GUID: ${hit.guid}<br>
      Tag: ${hit.tag || '–'}<br>
      Team: ${team}<br>
      X: ${hit.position.x} &nbsp; Z: ${hit.position.z}<br>
      Rot Y: ${hit.rotation_y ?? hit.rotation?.y ?? '–'}°<br>
      Size: ${hit.size ? `${hit.size.x} × ${hit.size.z}` : '–'}<br>
      ${hit.description ? 'Desc: ' + hit.description : ''}
    `;
  } else {
    tip.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
});

canvas.addEventListener('click', e => {
  const d = canvas._mapData;
  if (!d) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const hit = d.objs.find(obj => {
    const ox = d.px(obj.position.x);
    const oz = d.pz(obj.position.z);
    const dx = mx - ox, dy = my - oz;
    return Math.sqrt(dx*dx + dy*dy) <= d.unitR + 4;
  });

  highlightedUnit = (hit && hit.guid !== highlightedUnit) ? hit.guid : null;
  highlightUnitInList(highlightedUnit);
  if (snapshots.length) drawMap(snapshots[currentIdx]);
});

// ── Unit list ──────────────────────────────────────────────────────
function buildUnitList(snap) {
  const filteredObjs = (snap.battlefield_objects || []).filter(o => !BACKGROUND_TAGS.has(o.tag));
  const units = filteredObjs.filter(o =>
    o.type === 'unit' || (!o.type && !isTerrainObj(o) && !isObjectiveObj(o))
  );
  document.getElementById('unitCount').textContent = `(${units.length})`;

  const bounds = globalBounds || getBounds(filteredObjs);
  const list = document.getElementById('unitList');
  list.innerHTML = '';

  units.forEach(obj => {
    const team = guessTeam(obj, { minX: bounds.minX, maxX: bounds.maxX });
    const name = extractUnitName(obj.name) || '(unnamed)';
    const div = document.createElement('div');
    div.className = 'unit-item' + (obj.guid === highlightedUnit ? ' highlighted' : '');
    div.dataset.guid = obj.guid;
    div.innerHTML = `<div class="unit-dot ${team}"></div><span class="unit-name" title="${name}">${name}</span>`;
    div.addEventListener('click', () => {
      highlightedUnit = highlightedUnit === obj.guid ? null : obj.guid;
      buildUnitList(snap);
      if (snapshots.length) drawMap(snapshots[currentIdx]);
    });
    list.appendChild(div);
  });
}

function highlightUnitInList(guid) {
  document.querySelectorAll('.unit-item').forEach(el => {
    el.classList.toggle('highlighted', el.dataset.guid === guid);
  });
}

// ── Resize ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (snapshots.length) drawMap(snapshots[currentIdx]);
});
</script>
